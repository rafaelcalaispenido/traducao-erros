<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFS-e Error Mapping Tool — eNotas</title>
<link rel="icon" type="image/jpeg" href="logo-enotas.jpg">
<style>
  :root{
    --bg:#f3f4f7; --panel:#ffffff; --border:#e4e7ec; --text:#1f2937; --text-light:#6b7280;
    --primary:#7a1f6e; --primary-light:#f6edf4; --teal:#0ea899; --blue:#2d7dd2; --danger:#dc4747; --warn:#dd9d1f; --ok:#0ea899;
    --shadow-sm:0 1px 2px rgba(16,24,40,0.06); --shadow-md:0 4px 12px rgba(16,24,40,0.08); --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,"Inter",Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;}
  header{display:flex;align-items:center;gap:16px;padding:12px 24px;background:#fff;border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);position:relative;z-index:5;}
  header .logo-slot{width:120px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#9aa6ad;overflow:hidden;}
  header .logo-slot img{max-width:100%;max-height:100%;}
  header h1{font-size:16px;font-weight:600;margin:0;color:var(--text);letter-spacing:-0.01em;}
  header .spacer{flex:1;}
  .sync-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-light);}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#bbb;transition:background .2s;}
  .sync-dot.ok{background:var(--ok);}
  .sync-dot.err{background:var(--danger);}
  .sync-dot.loading{background:var(--warn);}
  button{cursor:pointer;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:500;transition:background .15s,box-shadow .15s,transform .1s,color .15s;}
  button:active{transform:translateY(1px);}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:var(--shadow-sm);}
  .btn-primary:hover{background:#6a1a5f;}
  .btn-teal{background:var(--teal);color:#fff;box-shadow:var(--shadow-sm);}
  .btn-teal:hover{background:#0c9486;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-ghost:hover{background:#f7f8fa;border-color:#d4d9e0;}
  .btn-sm{padding:6px 11px;font-size:12px;}
  .btn-icon{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;padding:0;background:transparent;border:1px solid var(--border);color:var(--text-light);border-radius:8px;}
  .btn-icon:hover{background:#f7f8fa;color:var(--primary);border-color:#d4d9e0;}
  .btn-icon svg{width:17px;height:17px;}
  .layout{display:flex;height:calc(100vh - 61px);}
  .sidebar{width:320px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;}
  .sidebar .progress-wrap{padding:16px 18px;border-bottom:1px solid var(--border);}
  .progress-bar{height:6px;background:#eef1f3;border-radius:3px;overflow:hidden;margin-top:7px;}
  .progress-bar > div{height:100%;background:var(--teal);transition:width .3s;border-radius:3px;}
  .sidebar .search{padding:12px 18px;border-bottom:1px solid var(--border);}
  .sidebar .search input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fafbfc;transition:border-color .15s,background .15s;}
  .sidebar .search input:focus{outline:none;border-color:var(--primary);background:#fff;}
  .sidebar .groups{flex:1;overflow-y:auto;padding:4px 0;}
  .group-title{padding:14px 18px 6px;font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--text-light);text-transform:uppercase;}
  .error-item{display:flex;align-items:center;gap:9px;padding:10px 18px;cursor:pointer;border-radius:8px;margin:1px 8px;transition:background .12s;}
  .error-item:hover{background:#f7f8fa;}
  .error-item.active{background:var(--primary-light);}
  .error-item .code{font-weight:600;font-size:12.5px;}
  .error-item .title{font-size:12px;color:var(--text-light);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .badge{width:8px;height:8px;border-radius:50%;flex:none;box-shadow:0 0 0 2px rgba(0,0,0,0.02);}
  .badge.nao_mapeado{background:var(--danger);}
  .badge.em_revisao{background:var(--warn);}
  .badge.pronto{background:var(--ok);}
  .main{flex:1;overflow-y:auto;padding:24px 32px;}
  .empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-light);}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px;}
  .tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-light);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--primary);border-bottom-color:var(--primary);}
  .panel{display:none;}
  .panel.active{display:block;}
  .diagram-box{position:absolute;width:220px;border:1px solid var(--border);border-radius:var(--radius);background:#fff;box-shadow:var(--shadow-sm);cursor:move;user-select:none;z-index:1;}
  .diagram-box.dragging{box-shadow:var(--shadow-md);z-index:50;}
  .diagram-line-hit{cursor:pointer;pointer-events:auto;}
  .diagram-line-visible{pointer-events:none;}
  .diagram-box .db-head{display:flex;align-items:center;gap:6px;padding:6px 8px;border-bottom:1px solid var(--border);font-size:11.5px;font-weight:600;color:var(--text-light);}
  .diagram-box .db-head .db-actions{margin-left:auto;display:flex;gap:4px;}
  .diagram-box .db-head button{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-light);padding:0 2px;}
  .diagram-box .db-head button:hover{color:var(--primary);}
  .diagram-box-pergunta .db-head{background:#f6edf4;color:#7a1f6e;border-bottom-color:#e7d3e2;}
  .diagram-box-pergunta .db-head button{color:#7a1f6e;}
  .diagram-box-periodo .db-head{background:#eaf1fb;color:#2560b8;border-bottom-color:#dde8f8;}
  .diagram-box-periodo .db-head button{color:#2560b8;}
  .diagram-term-message{background:#fbf2df;}
  .diagram-term-message .db-head{background:#f5e6c4;color:#9a6512;border-bottom-color:#efe3c4;}
  .diagram-term-correction{background:#e8f4f0;}
  .diagram-term-correction .db-head{background:#d8ece4;color:#0f7a66;border-bottom-color:#cfe7df;}
  .diagram-legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-light);margin:10px 0;align-items:center;}
  .diagram-legend .lg-item{display:flex;align-items:center;gap:6px;}
  .diagram-legend .lg-dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto;}
  .diagram-box .db-body{padding:8px;font-size:12.5px;line-height:1.4;}
  .diagram-box .db-branches{padding:0 8px 8px;}
  .diagram-branch-row{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-light);margin-top:4px;}
  .diagram-branch-row .db-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .diagram-port{width:12px;height:12px;border-radius:50%;background:var(--teal,#0a8a7d);border:2px solid #fff;box-shadow:0 0 0 1px var(--teal,#0a8a7d);cursor:crosshair;flex:0 0 auto;}
  .diagram-port:hover{transform:scale(1.25);}
  .diagram-port.diagram-port-empty{width:auto;height:auto;border-radius:999px;background:#fff;border:1px dashed #7a1f6e;box-shadow:none;color:#7a1f6e;font-size:10.5px;font-weight:600;padding:2px 7px;white-space:nowrap;}
  .diagram-port.diagram-port-empty:hover{transform:none;background:#f6edf4;}
  .diagram-port.diagram-port-armed{animation:diagram-port-pulse 1s infinite;}
  @keyframes diagram-port-pulse{0%{box-shadow:0 0 0 1px var(--teal,#0a8a7d),0 0 0 0 rgba(10,138,125,0.5);}70%{box-shadow:0 0 0 1px var(--teal,#0a8a7d),0 0 0 7px rgba(10,138,125,0);}100%{box-shadow:0 0 0 1px var(--teal,#0a8a7d),0 0 0 0 rgba(10,138,125,0);}}
  .diagram-box.diagram-drop-valid{outline:3px solid var(--primary,#2563eb);outline-offset:1px;}
  .diagram-box.diagram-drop-invalid{outline:3px solid #d33;outline-offset:1px;}
  .diagram-connect-hint{position:absolute;background:#1f2937;color:#fff;font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;z-index:101;pointer-events:none;}
  .diagram-port-popover{position:absolute;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.18);padding:10px;width:280px;z-index:100;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:5px;color:var(--text);}
  .field .hint{font-size:11.5px;color:var(--text-light);margin-top:3px;}
  input[type=text],input[type=url],input[type=number],textarea,select{
    width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:var(--text);transition:border-color .15s,box-shadow .15s;
  }
  select{
    appearance:none;-webkit-appearance:none;-moz-appearance:none;
    padding-right:34px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%236b7280' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat;background-position:right 12px center;background-size:10px 6px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  input[type=text]:focus,input[type=url]:focus,input[type=number]:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light);}
  .custom-select-wrap{position:relative;user-select:none;}
  .custom-select-trigger{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;padding:9px 34px 9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:var(--text);cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .custom-select-trigger.placeholder-opt{color:var(--text-light);}
  .custom-select-trigger::after{content:"";position:absolute;top:50%;right:12px;width:10px;height:6px;transform:translateY(-50%);background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%236b7280' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;transition:transform .15s;}
  .custom-select-wrap.open .custom-select-trigger{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light);}
  .custom-select-wrap.open .custom-select-trigger::after{transform:translateY(-50%) rotate(180deg);}
  .custom-select-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:9999;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-md),0 8px 24px rgba(0,0,0,.12);overflow:hidden;display:none;max-height:260px;overflow-y:auto;}
  .custom-select-wrap.open .custom-select-dropdown{display:block;animation:csDropIn .12s ease;}
  .custom-select-option{padding:9px 14px;font-size:13px;color:var(--text);cursor:pointer;transition:background .1s;}
  .custom-select-option:hover{background:var(--primary-light);}
  .custom-select-option.selected{background:var(--primary-light);color:var(--primary);font-weight:600;}
  .custom-select-option.placeholder-opt{font-style:italic;color:var(--text-light);}
  @keyframes csDropIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
  textarea{resize:vertical;min-height:60px;}
  .row{display:flex;gap:16px;}
  .row > .field{flex:1;}
  .invalid input,.invalid textarea,.invalid select{border-color:var(--danger);background:#fff5f5;}
  .invalid-msg{color:var(--danger);font-size:11.5px;margin-top:3px;}
  .toggle{display:inline-flex;align-items:center;gap:8px;}
  .toggle input{width:auto;}
  .tags-input{display:flex;flex-wrap:wrap;gap:6px;padding:7px;border:1px solid var(--border);border-radius:8px;}
  .status-checklist{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px;}
  .status-checklist li{font-size:13px;padding:8px 12px;border-radius:8px;background:#f6f7f8;}
  .status-checklist li.done{color:#0f7a3e;}
  .status-checklist li.pending{color:var(--text-light);}
  .help-wrap{max-width:760px;padding:24px 4px;}
  .help-wrap h2{margin:0 0 8px;font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.01em;}
  .help-section{margin-bottom:18px;padding:18px 20px;border-radius:var(--radius);background:#fff;border:1px solid var(--border);box-shadow:var(--shadow-sm);}
  .help-section h3{font-size:14.5px;font-weight:700;margin:0 0 8px;color:var(--primary);}
  .help-section p{font-size:13px;color:var(--text);line-height:1.55;margin:0 0 8px;}
  .help-section ul{margin:0 0 8px;padding-left:20px;}
  .help-section li{font-size:13px;color:var(--text);line-height:1.55;margin-bottom:4px;}
  .tag{background:#eef1f3;border-radius:3px;padding:3px 8px;font-size:12px;display:flex;align-items:center;gap:6px;}
  .tag button{background:none;color:var(--text-light);padding:0;font-size:14px;}
  .tags-input input{border:none;flex:1;min-width:100px;padding:3px;}
  .step-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;padding:10px;background:#fafbfc;border:1px solid var(--border);border-radius:8px;cursor:grab;}
  .step-item .num{font-weight:700;color:var(--primary);width:22px;flex:none;padding-top:8px;text-align:center;}
  .step-item textarea{flex:1;}
  .step-item .rm{background:none;color:var(--danger);font-size:18px;padding:4px;}
  .two-col{display:flex;gap:24px;}
  .two-col > div{flex:1;min-width:0;}
  .agente-cols{display:flex;gap:26px;align-items:flex-start;}
  .agente-col-main{flex:1.55;min-width:0;}
  .agente-col-preview{flex:1;min-width:260px;}
  .agente-col-preview .preview-card{position:sticky;top:10px;}
  .preview-card{position:sticky;top:0;border:1px solid var(--border);border-radius:var(--radius);padding:20px;background:#fff;box-shadow:var(--shadow-sm);}
  .preview-card h3{margin:0 0 8px;font-size:15px;color:var(--text);}
  .preview-card .cause{font-size:12.5px;color:var(--text-light);margin-bottom:10px;}
  .preview-card ol{margin:0 0 10px;padding-left:18px;font-size:13px;}
  .preview-card .tip{background:#eef7f4;border-radius:5px;padding:8px 10px;font-size:12px;color:#1d6f5a;}
  .question-block,.rule-block{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;background:#fff;box-shadow:var(--shadow-sm);}
  .dest-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 10px;border-radius:999px;border:1px solid transparent;cursor:pointer;}
  .dest-pill.dest-step{background:#f6edf4;color:#7a1f6e;border-color:#e7d3e2;}
  .dest-pill.dest-message{background:#fbf2df;color:#9a6512;border-color:#efe3c4;}
  .dest-pill.dest-apply_correction{background:#e8f4f0;color:#0f7a66;border-color:#cfe7df;}
  .dest-pill.dest-empty{background:#fbe9e8;color:#c0453f;border-color:#e3b6b3;border-style:dashed;}
  .dest-pill:hover{filter:brightness(0.96);}
  .dest-picker{margin-top:8px;border:1px solid var(--border);border-radius:8px;padding:10px;background:#fff;box-shadow:0 4px 16px rgba(0,0,0,0.08);}
  .dest-picker .dest-opt{display:block;width:100%;text-align:left;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:#fafbfc;margin-bottom:6px;font-size:12.5px;cursor:pointer;}
  .dest-picker .dest-opt:hover{border-color:var(--primary);background:#f5edf3;}
  .dest-picker .dest-step-chip{display:inline-block;padding:4px 9px;border-radius:999px;border:1px solid #e7d3e2;background:#f6edf4;color:#7a1f6e;font-size:12px;cursor:pointer;margin:3px 4px 0 0;}
  .dest-picker .dest-step-chip:hover{background:#7a1f6e;color:#fff;}
  .dest-picker textarea{width:100%;margin-top:6px;}
  .dest-picker .dest-confirm{margin-top:6px;font-size:11.5px;padding:5px 10px;}
  .branch-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:8px;background:#fafbfc;}
  .branch-row .branch-opt-label{font-size:12.5px;flex:0 0 auto;}
  .question-block .top-row,.rule-block .top-row{display:flex;gap:10px;align-items:flex-start;}
  .flow-branch{margin-top:10px;}
  .flow-jump-chip{margin:6px 0;color:var(--danger,#c0392b);}
  .flow-highlight{outline:2px solid var(--teal,#0a8a7d);transition:outline 0.2s;}
  .flow-script-step{margin-bottom:6px;}
  .flow-script-q{font-weight:600;margin-bottom:2px;}
  .flow-script-branch{margin:8px 0 8px 6px;padding:8px 0 0;border-top:1px dashed var(--border);}
  .flow-script-branch-label{font-weight:600;color:var(--teal,#0a8a7d);margin-bottom:6px;}
  .rule-line{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:12.5px;}
  .rule-line select,.rule-line input{width:auto;}
  .options-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .section-title{font-size:13px;font-weight:700;margin:22px 0 10px;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:6px;}
  .system-prompt-box{white-space:pre-wrap;background:#1e2630;color:#cfe8df;padding:14px;border-radius:6px;font-family:monospace;font-size:12px;max-height:320px;overflow:auto;}
  .banner-error{background:#fdecec;border:1px solid #f3c4c4;color:var(--danger);padding:10px 14px;border-radius:5px;margin-bottom:14px;font-size:12.5px;}
  .filters{display:flex;flex-wrap:wrap;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);}
  .chip{font-size:11.5px;padding:5px 11px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--text-light);cursor:pointer;transition:background .15s,color .15s,border-color .15s;}
  .chip:hover{border-color:#d4d9e0;}
  .chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .rich-editor{border:1px solid var(--border);border-radius:5px;overflow:hidden;background:#fff;}
  .rt-toolbar{display:flex;align-items:center;gap:2px;padding:4px 6px;border-bottom:1px solid var(--border);background:#fafbfc;flex-wrap:wrap;}
  .rt-toolbar select{width:auto;padding:3px 6px;font-size:12px;border:none;background:transparent;color:var(--text-light);}
  .rt-toolbar button{background:transparent;border:none;color:var(--text);font-size:13px;padding:4px 7px;border-radius:4px;line-height:1;}
  .rt-toolbar button:hover{background:#eef1f3;}
  .rt-content{min-height:60px;max-height:260px;overflow-y:auto;padding:8px 10px;font-size:13px;outline:none;}
  .rt-content[data-empty="true"]:before{content:attr(data-placeholder);color:#9aa6ad;}
  .rt-content p{margin:0 0 8px;}
  .rt-content ul,.rt-content ol{margin:0 0 8px;padding-left:20px;}
  .rt-content blockquote{margin:0 0 8px;padding-left:10px;border-left:3px solid var(--border);color:var(--text-light);}
  .title-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 10px;}
  .title-suggestion{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:5px;background:#fafbfc;cursor:pointer;text-align:left;max-width:100%;}
  .title-suggestion:hover{border-color:var(--primary);background:#f5edf3;}
  .bot-sim-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .bot-sim-modal{width:600px;max-height:82vh;background:#fff;border-radius:8px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.25);}
  .bot-sim-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:#fafbfc;}
  .bot-sim-header button{background:none;font-size:18px;color:var(--text-light);padding:2px 6px;}
  .bot-sim-chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:#f7f9fa;}
  .bot-sim-msg{max-width:88%;padding:9px 12px;border-radius:10px;font-size:13px;line-height:1.45;}
  .bot-sim-msg.bot{background:#fff;border:1px solid var(--border);align-self:flex-start;}
  .bot-sim-msg.user{background:var(--primary);color:#fff;align-self:flex-end;}
  .bot-sim-interactive{display:flex;gap:8px;flex-wrap:wrap;align-self:flex-start;align-items:center;}
  .bot-sim-interactive button{background:#fff;border:1px solid var(--primary);color:var(--primary);font-size:12.5px;padding:6px 10px;border-radius:14px;}
  .bot-sim-interactive button:hover{background:var(--primary);color:#fff;}
  .bot-sim-interactive input{padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:12.5px;width:auto;}

function buildSeed(){
  const errors = [];
  for(const group of Object.keys(SEED_RAW)){
    for(const [code, msg] of SEED_RAW[group]){
      errors.push({
        code, group, original_message: msg,
        match_patterns: [code], requires_prefecture: false, status: "nao_mapeado",
        client_facing: { title:"", title_suggestions: TITLE_SUGGESTIONS[code] || [], description:"", steps:[], extra_tip:"" },
        agent_flow: { flow_steps:[], start_step_id:null, post_fix_followup:{ enabled:false, message:"" }, escalation:{ after_attempts:3, message:"", zendesk_url:"" }, system_prompt_preview:"" }
      });
    }
  }
  return { version:"1.0", exported_at:new Date().toISOString(), errors };
}

const GROUP_LABELS = { portal_nacional:"Portal Nacional", abrasf:"ABRASF", xml_soap:"XML/SOAP" };
const STATUS_LABELS = { nao_mapeado:"Não mapeado", em_revisao:"Em revisão", pronto:"Pronto" };

/* ================= ESTADO ================= */
let state = null;
let selectedCode = null;
let saveTimer = null;
let lastSavedAt = null;
let statusFilter = new Set();

function setSyncStatus(kind, text){
  const dot = document.getElementById("syncDot");
  const label = document.getElementById("syncText");
  dot.className = "sync-dot " + kind;
  label.textContent = text;
}

/* ================= GIST: LOAD / SAVE ================= */
async function loadFromGist(){
  setSyncStatus("loading","Carregando...");
  try{
    const res = await fetch(GIST_API, { headers: { Authorization: "token " + getToken() } });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const file = data.files && data.files[GIST_FILE];
    if(file && file.content){
      state = JSON.parse(file.content);
      setSyncStatus("ok","Sincronizado");
    } else {
      state = buildSeed();
      await saveToGist(true);
    }
  } catch(err){
    console.error("Erro ao carregar Gist:", err);
    const cached = localStorage.getItem("nfse-errors-cache");
    if(cached){
      state = JSON.parse(cached);
      setSyncStatus("err","Erro ao sincronizar (usando cache local)");
    } else {
      state = buildSeed();
      setSyncStatus("err","Erro ao sincronizar (dados de seed locais)");
    }
  }
  localStorage.setItem("nfse-errors-cache", JSON.stringify(state));
  render();
}

async function saveToGist(silent){
  if(!silent) setSyncStatus("loading","Salvando...");
  try{
    const res = await fetch(GIST_API, {
      method:"PATCH",
      headers:{ Authorization:"token " + getToken(), "Content-Type":"application/json" },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(state, null, 2) } } })
    });
    if(!res.ok) throw new Error("HTTP " + res.status);
    lastSavedAt = new Date();
    localStorage.setItem("nfse-errors-cache", JSON.stringify(state));
    setSyncStatus("ok","Sincronizado às " + lastSavedAt.toLocaleTimeString());
  } catch(err){
    console.error("Erro ao salvar Gist:", err);
    localStorage.setItem("nfse-errors-cache", JSON.stringify(state));
    setSyncStatus("err","Erro ao sincronizar (alterações salvas só localmente)");
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToGist(false), 1500);
}

/* ================= RENDER SIDEBAR ================= */
function render(){
  renderProgress();
  renderSidebar();
  renderMain();
}

function renderProgress(){
  const total = state.errors.length;
  const done = state.errors.filter(e => e.status === "pronto").length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("progressLabel").textContent = `${done} / ${total} erros mapeados (${pct}%)`;
  document.getElementById("progressFill").style.width = pct + "%";
}

function renderFilters(){
  const statusBox = document.getElementById("statusFilters");
  statusBox.innerHTML = Object.entries(STATUS_LABELS).map(([k,v]) =>
    `<span class="chip ${statusFilter.has(k)?'active':''}" data-status="${k}">${v}</span>`
  ).join('');
  statusBox.querySelectorAll(".chip").forEach(chip => chip.onclick = () => {
    const k = chip.dataset.status;
    statusFilter.has(k) ? statusFilter.delete(k) : statusFilter.add(k);
    renderSidebar();
  });
}

function renderSidebar(){
  renderFilters();
  const container = document.getElementById("groupsContainer");
  container.innerHTML = "";
  const term = (document.getElementById("searchInput").value || "").toLowerCase();
  for(const group of Object.keys(GROUP_LABELS)){
    const items = state.errors.filter(e => e.group === group && (
      e.code.toLowerCase().includes(term) || (e.client_facing.title||"").toLowerCase().includes(term)
    ) && (statusFilter.size === 0 || statusFilter.has(e.status))
    );
    if(items.length === 0) continue;
    const title = document.createElement("div");
    title.className = "group-title";
    title.textContent = GROUP_LABELS[group] + " (" + items.length + ")";
    container.appendChild(title);
    for(const e of items){
      const row = document.createElement("div");
      row.className = "error-item" + (e.code === selectedCode ? " active" : "");
      row.innerHTML = `<span class="badge ${e.status}"></span><span class="code">${escapeHtml(e.code)}</span><span class="title">${escapeHtml(e.client_facing.title || e.original_message)}</span>`;
      row.onclick = () => { selectedCode = e.code; viewMode = "errors"; setHash(activeTab); render(); };
      container.appendChild(row);
    }
  }
}

document.getElementById("searchInput").addEventListener("input", renderSidebar);

/* ================= MAIN FORM ================= */
let activeTab = "identificacao";
let viewMode = "errors";
const VALID_TABS = ["identificacao","cliente","agente","diagrama","status"];

function getSelected(){ return state.errors.find(e => e.code === selectedCode); }

function setHash(h){
  if(location.hash !== "#" + h) location.hash = h;
}

function applyHash(){
  const h = location.hash.replace(/^#/, "");
  if(h === "ajuda"){
    viewMode = "ajuda";
  } else if(VALID_TABS.includes(h)){
    viewMode = "errors";
    activeTab = h;
  }
}

window.addEventListener("hashchange", () => { applyHash(); render(); });

function renderMain(){
  const main = document.getElementById("mainArea");
  if(viewMode === "ajuda"){
    renderHelp(main);
    return;
  }
  const err = getSelected();
  if(!err){
    main.innerHTML = '<div class="empty-state">Selecione um erro na lista à esquerda, ou crie um novo.</div>';
    return;
  }

      <div class="tab ${activeTab==='cliente'?'active':''}" data-tab="cliente">2. Apresentação ao Cliente</div>
      <div class="tab ${activeTab==='agente'?'active':''}" data-tab="agente">3. Fluxo do Agente</div>
      <div class="tab ${activeTab==='diagrama'?'active':''}" data-tab="diagrama">4. Diagrama</div>
      <div class="tab ${activeTab==='status'?'active':''}" data-tab="status">5. Status de Mapeamento</div>
    </div>
    <div id="panelIdentificacao" class="panel ${activeTab==='identificacao'?'active':''}"></div>
    <div id="panelCliente" class="panel ${activeTab==='cliente'?'active':''}"></div>

  `;
  main.querySelectorAll(".tab").forEach(t => t.onclick = () => { activeTab = t.dataset.tab; viewMode = "errors"; setHash(activeTab); renderMain(); });

}

function fieldChanged(){ scheduleSave(); renderSidebar(); renderProgress(); }

/* ----- ABA 1 ----- */
function renderTabIdentificacao(err){
  const p = document.getElementById("panelIdentificacao");
  p.innerHTML = `
    <div class="row">
      <div class="field">
        <label>Código do erro *</label>
        <input type="text" id="f_code" value="${escapeAttr(err.code)}">
      </div>
      <div class="field" style="flex:none;align-self:flex-end;margin-bottom:16px;">
        <button class="btn-ghost btn-sm" id="btnDuplicate" type="button">Duplicar erro</button>
      </div>
      <div class="field">
        <label>Grupo</label>
        <select id="f_group">
          ${Object.entries(GROUP_LABELS).map(([k,v]) => `<option value="${k}" ${err.group===k?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field">
      <label>Mensagem original do sistema (referência)</label>
      <textarea readonly>${escapeHtml(err.original_message)}</textarea>
    </div>
    <div class="field">
      <label>Padrões de identificação</label>
      <div class="tags-input" id="f_patterns_wrap">
        ${err.match_patterns.map((t,i) => `<span class="tag">${escapeHtml(t)}<button data-i="${i}" class="rm-pattern">×</button></span>`).join('')}
        <input type="text" id="f_pattern_new" placeholder="Digite e pressione Enter">
      </div>
      <div class="hint">Termos que identificam esse erro no texto livre retornado pela API.</div>
    </div>
    <div class="row">
      <div class="field">
        <label class="toggle"><input type="checkbox" id="f_requires_prefecture" ${err.requires_prefecture?'checked':''}> Requer ação na Prefeitura/Portal Nacional?</label>
      </div>
    </div>
  `;
  document.getElementById("f_code").onchange = e => { err.code = e.target.value; selectedCode = err.code; fieldChanged(); };
  document.getElementById("f_group").onchange = e => { err.group = e.target.value; fieldChanged(); };
  document.getElementById("f_requires_prefecture").onchange = e => { err.requires_prefecture = e.target.checked; fieldChanged(); };
  const patInput = document.getElementById("f_pattern_new");
  patInput.onkeydown = e => {
    if(e.key === "Enter" && patInput.value.trim()){
      err.match_patterns.push(patInput.value.trim());
      patInput.value = "";
      fieldChanged(); renderTabIdentificacao(err);
    }
  };
  p.querySelectorAll(".rm-pattern").forEach(btn => btn.onclick = () => {
    err.match_patterns.splice(+btn.dataset.i, 1);
    fieldChanged(); renderTabIdentificacao(err);
  });
  document.getElementById("btnDuplicate").onclick = () => {
    const newCode = prompt("Código do erro duplicado:", err.code + "_COPIA");
    if(!newCode) return;
    if(state.errors.some(e => e.code === newCode)){ alert("Já existe um erro com esse código."); return; }
    const copy = JSON.parse(JSON.stringify(err));
    copy.code = newCode;
    copy.status = "em_revisao";
    state.errors.push(copy);
    selectedCode = newCode;
    fieldChanged();
    render();
  };
}

// Erro é considerado "pronto" quando a apresentação ao cliente (Aba 2) está completa;
// o fluxo do agente (Aba 3) é opcional e não bloqueia o status.
function validateReadyToShip(err){
  return !!(err.client_facing.title && htmlToText(err.client_facing.description) && err.client_facing.steps.some(s => htmlToText(s)));
}

/* ----- ABA 5 ----- */
function renderTabStatus(err){
  const p = document.getElementById("panelStatus");
  const checklist = [
    { label: "Identificação do erro preenchida (Aba 1)", done: !!(err.code && err.group) },
    { label: "Título e descrição para o cliente preenchidos (Aba 2)", done: !!(err.client_facing.title && htmlToText(err.client_facing.description)) },
    { label: "Pelo menos um passo de orientação ao cliente (Aba 2)", done: err.client_facing.steps.some(s => htmlToText(s)) },
    { label: "Fluxo do agente possui ao menos uma etapa (Aba 3)", done: err.agent_flow.flow_steps.length > 0 },
    { label: "Etapa inicial do fluxo definida (Aba 3)", done: !!err.agent_flow.start_step_id },
  ];
  const pending = checklist.filter(c => !c.done).length;
  p.innerHTML = `
    <div class="field">
      <label>Status de mapeamento</label>
      <select id="f_status">
        ${Object.entries(STATUS_LABELS).map(([k,v]) => `<option value="${k}" ${err.status===k?'selected':''}>${v}</option>`).join('')}
      </select>
      <div class="hint">Use esta etapa para concluir se o mapeamento deste erro está finalizado ou ainda em andamento.</div>
    </div>
    <div class="field">
      <label>Checklist de finalização</label>
      <ul class="status-checklist">
        ${checklist.map(c => `<li class="${c.done?'done':'pending'}">${c.done?'✓':'○'} ${escapeHtml(c.label)}</li>`).join('')}
      </ul>
      <div class="hint">${pending===0 ? 'Todos os itens essenciais estão preenchidos.' : `${pending} item(ns) pendente(s) antes de marcar como "Pronto".`}</div>
    </div>
  `;
  document.getElementById("f_status").onchange = e => {
    if(e.target.value === "pronto" && !validateReadyToShip(err)){
      alert("Preencha os campos obrigatórios das Abas 1 e 2 antes de marcar como Pronto.");
      e.target.value = err.status;
      return;
    }
    err.status = e.target.value; fieldChanged();
  };
}

        </div>
        <div class="field">
          <label>Tip extra / aviso adicional</label>
          <div class="rich-editor" id="c_tip"></div>

      </div>
      <div>
        <div class="preview-card">
          <h3 id="prevTitle">${escapeHtml(err.client_facing.title) || "Título do erro"}</h3>

        </div>
      </div>
    </div>
  `;
  document.getElementById("c_title").oninput = e => { err.client_facing.title = e.target.value; document.getElementById("prevTitle").textContent = e.target.value || "Título do erro"; fieldChanged(); };
  const suggestionsBox = document.getElementById("titleSuggestions");
  if(suggestionsBox){

      const value = suggestions[+btn.dataset.i];

      document.getElementById("c_title").value = value;
      document.getElementById("prevTitle").textContent = value;
      fieldChanged();
      renderTabCliente(err);
    });
  }
  mountRichEditor(document.getElementById("c_description"), err.client_facing.description, "Descreva o passo a passo para solução...", html => {
    err.client_facing.description = html;
    document.getElementById("prevDesc").innerHTML = html || "<p>Descrição amigável aparecerá aqui.</p>";
    fieldChanged();
  });
  mountRichEditor(document.getElementById("c_tip"), err.client_facing.extra_tip, "Aviso ou dica extra (opcional)...", html => {
    err.client_facing.extra_tip = html;
    const tipEl = document.getElementById("prevTip");
    tipEl.innerHTML = html || "";
    tipEl.style.display = htmlToText(html) ? "" : "none";
    fieldChanged();
  });
  document.getElementById("btnAddStep").onclick = () => { err.client_facing.steps.push(""); fieldChanged(); renderTabCliente(err); };
  renderSteps(err);
}

function renderSteps(err){
  const list = document.getElementById("stepsList");
  list.innerHTML = "";
  err.client_facing.steps.forEach((step, i) => {
    const row = document.createElement("div");
    row.className = "step-item";
    row.draggable = true;
    row.dataset.i = i;
    row.innerHTML = `<div class="num">${i+1}</div><div class="rich-editor" style="flex:1;"></div><button class="rm">×</button>`;
    mountRichEditor(row.querySelector(".rich-editor"), step, "Descreva este passo...", html => {
      err.client_facing.steps[i] = html;
      updatePreviewSteps(err);
      fieldChanged();
    });
    row.querySelector(".rm").onclick = () => { err.client_facing.steps.splice(i,1); fieldChanged(); renderTabCliente(err); };
    row.ondragstart = e => e.dataTransfer.setData("text/plain", i);
    row.ondragover = e => e.preventDefault();
    row.ondrop = e => {
      e.preventDefault();
      const from = +e.dataTransfer.getData("text/plain");
      const to = i;
      const [moved] = err.client_facing.steps.splice(from,1);
      err.client_facing.steps.splice(to,0,moved);
      fieldChanged(); renderTabCliente(err);
    };
    list.appendChild(row);
  });
  updatePreviewSteps(err);
}

function updatePreviewSteps(err){
  const ol = document.getElementById("prevSteps");
  if(!ol) return;
  ol.innerHTML = err.client_facing.steps.map(s => `<li>${s}</li>`).join('');
}

function newFlowStep(type){
  const id = "s_" + Math.random().toString(36).slice(2,9);
  if(type === "periodo"){
    return { id, type:"periodo", text:"", after:{ kind:null } };
  }
  return {
    id, type:"question", text:"", response_type:"sim_nao",
    options:[ { label:"Sim", after:{ kind:null } }, { label:"Não", after:{ kind:null } } ],
    after:{ kind:null }
  };
}

function stepNumber(err, stepId){
  const idx = err.agent_flow.flow_steps.findIndex(s => s.id === stepId);
  return idx === -1 ? "?" : (idx + 1);
}

function stepLabel(err, step){
  const t = htmlToText(step.text);
  const n = stepNumber(err, step.id);
  const preview = t ? (t.length > 40 ? t.slice(0,40)+"…" : t) : (step.type === "periodo" ? "(coleta de período)" : "(sem texto)");
  return `Etapa ${n} — ${escapeHtml(preview)}`;
}

  const options = [{value:"",label:"(nenhuma)"}].concat(
    steps.map(s => ({value:s.id,label:stepLabel(err, s)}))
  );
  renderCustomSelect(wrap, options, err.agent_flow.start_step_id || "", "(nenhuma)", value => {
    err.agent_flow.start_step_id = value || null;
    fieldChanged(); updateSystemPrompt(err);
  });

function closeAllCustomSelects(){
  document.querySelectorAll(".custom-select-wrap.open").forEach(w => w.classList.remove("open"));
}
document.addEventListener("click", e => {
  if(!e.target.closest(".custom-select-wrap")) closeAllCustomSelects();
});

function renderCustomSelect(wrap, options, value, placeholder, onChange){
  const selected = options.find(o => o.value === value) || options[0];
  wrap.innerHTML = `
    <div class="custom-select-trigger ${(!value || selected===options[0])?'placeholder-opt':''}">${selected ? selected.label : placeholder}</div>
    <div class="custom-select-dropdown">
      ${options.map(o => `<div class="custom-select-option ${o.value===''?'placeholder-opt':''} ${o.value===value?'selected':''}" data-value="${o.value}">${o.label}</div>`).join('')}
    </div>
  `;
  wrap.querySelector(".custom-select-trigger").onclick = e => {
    e.stopPropagation();
    const isOpen = wrap.classList.contains("open");
    closeAllCustomSelects();
    if(!isOpen) wrap.classList.add("open");
  };
  wrap.querySelectorAll(".custom-select-option").forEach(opt => {
    opt.onclick = e => {
      e.stopPropagation();
      closeAllCustomSelects();
      const newValue = opt.dataset.value;
      const trigger = wrap.querySelector(".custom-select-trigger");
      trigger.textContent = opt.textContent;
      trigger.classList.toggle("placeholder-opt", newValue === "" && opt.classList.contains("placeholder-opt"));
      wrap.querySelectorAll(".custom-select-option").forEach(o => o.classList.toggle("selected", o === opt));
      onChange(newValue);
    };
  });
}

function destPillLabel(after, err){
  const kind = after && after.kind;
  if(kind === "step"){
    const step = err.agent_flow.flow_steps.find(s => s.id === after.step_id);
    return step ? `→ ${stepLabel(err, step)}` : "→ etapa removida";
  }
  if(kind === "message") return "✓ Mensagem final";
  if(kind === "apply_correction") return "✓ Corrigir vendas + mensagem";
  return "⚠ Sem destino definido";
}
function destPillClass(after){
  const kind = after && after.kind;
  if(kind === "step") return "dest-step";
  if(kind === "message") return "dest-message";
  if(kind === "apply_correction") return "dest-apply_correction";
  return "dest-empty";
}

    picker.querySelectorAll(".dest-opt").forEach(btn => {

        if(k === "step"){

    const select = typeRow.querySelector(".response-type-select");
    select.onchange = e => {

        const afterEditor = document.createElement("div");

function highlightStep(stepId){

  el.classList.add("flow-highlight");

function stepBranchTargets(step){
  if(step.type === "periodo") return [{ key:"main", label:null, after: step.after }];
  if(step.response_type === "texto_livre") return [{ key:"main", label:null, after: step.after }];
  return (step.options||[]).map((opt, oi) => ({ key:String(oi), label: opt.label, after: opt.after }));
}

function removeStepAndReferences(err, stepId){
  const ef = err.agent_flow;
  const idx = ef.flow_steps.findIndex(s => s.id === stepId);
  if(idx === -1) return;
  ef.flow_steps.splice(idx,1);
  if(ef.start_step_id === stepId) ef.start_step_id = ef.flow_steps[0] ? ef.flow_steps[0].id : null;
  ef.flow_steps.forEach(s => {
    stepBranchTargets(s).forEach(b => {
      if(b.after && b.after.kind === "step" && b.after.step_id === stepId){
        b.after.kind = null;
        delete b.after.step_id;
      }
    });
  });
  if(ef.diagram_positions) delete ef.diagram_positions[stepId];
}

function renderFlowSteps(err){
  renderStartStepSelect(err);
  const list = document.getElementById("flowStepsList");
  list.innerHTML = "";
  err.agent_flow.flow_steps.forEach(step => {
    list.appendChild(buildStepCard(step, err));
  });
}

/* ----- ABA 4: DIAGRAMA VISUAL ----- */
function diagramLayout(err){
  const ef = err.agent_flow;
  const positions = ef.diagram_positions = ef.diagram_positions || {};
  const termPositions = ef.diagram_term_positions = ef.diagram_term_positions || {};
  const depth = {};
  const order = [];
  const visited = new Set();
  if(ef.start_step_id){
    const queue = [[ef.start_step_id, 0]];
    while(queue.length){
      const [id, d] = queue.shift();
      if(visited.has(id)) continue;
      visited.add(id);
      depth[id] = d;
      order.push(id);
      const step = ef.flow_steps.find(s => s.id === id);
      if(!step) continue;
      stepBranchTargets(step).forEach(b => {
        if(b.after && b.after.kind === "step" && b.after.step_id && !visited.has(b.after.step_id)){
          queue.push([b.after.step_id, d+1]);
        }
      });
    }
  }
  const maxDepth = order.length ? Math.max(...order.map(id => depth[id])) : -1;
  ef.flow_steps.forEach(s => {
    if(!visited.has(s.id)){
      depth[s.id] = maxDepth + 1;
      order.push(s.id);
      visited.add(s.id);
    }
  });
  const colCount = {};
  order.forEach(id => {
    const d = depth[id] || 0;
    const row = colCount[d] || 0;
    colCount[d] = row + 1;
    if(!positions[id]) positions[id] = { x: 40 + d*260, y: 40 + row*150 };
  });
  ef.flow_steps.forEach(step => {
    stepBranchTargets(step).forEach(branch => {
      if(!branch.after || (branch.after.kind !== "message" && branch.after.kind !== "apply_correction")) return;
      const key = step.id + "::" + branch.key;
      const d = (depth[step.id] || 0) + 1;
      const row = colCount[d] || 0;
      colCount[d] = row + 1;
      if(!termPositions[key]) termPositions[key] = { x: 40 + d*260, y: 40 + row*150 };
    });
  });
  return { positions, termPositions, depth };
}

  const allY = ef.flow_steps.map(s => (positions[s.id]?.y||0) + 220).concat(Object.values(termPositions).map(t => t.y + 160));
  const maxX = allX.length ? Math.max(...allX) : 600;
  const maxY = allY.length ? Math.max(...allY) : 400;

  p.innerHTML = `
    <div class="hint" style="margin-bottom:10px;">Arraste as caixas para reorganizar. Para ligar um destino: arraste a bolinha de saída até a etapa desejada (ela fica destacada enquanto você arrasta), ou clique na bolinha uma vez para "armar" a conexão e depois clique na etapa de destino (Esc cancela; clique na bolinha de novo para escolher "mensagem final"/"aplicar correção"). Use ✎ para editar o texto na aba 3, × para excluir.</div>
