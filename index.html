<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFS-e Error Mapping Tool — eNotas</title>
<style>
  :root{

  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
  header{display:flex;align-items:center;gap:16px;padding:10px 20px;background:#fff;border-bottom:1px solid var(--border);}
  header .logo-slot{width:120px;height:36px;border:1px dashed #c7cdd1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#9aa6ad;overflow:hidden;}
  header .logo-slot img{max-width:100%;max-height:100%;}
  header h1{font-size:16px;font-weight:600;margin:0;color:var(--text);}
  header .spacer{flex:1;}
  .sync-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-light);}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#bbb;}
  .sync-dot.ok{background:var(--ok);}
  .sync-dot.err{background:var(--danger);}
  .sync-dot.loading{background:var(--warn);}
  button{cursor:pointer;border:none;border-radius:5px;padding:8px 14px;font-size:13px;font-weight:500;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-teal{background:var(--teal);color:#fff;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .layout{display:flex;height:calc(100vh - 57px);}
  .sidebar{width:320px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;}
  .sidebar .progress-wrap{padding:14px 16px;border-bottom:1px solid var(--border);}
  .progress-bar{height:6px;background:#eef1f3;border-radius:3px;overflow:hidden;margin-top:6px;}
  .progress-bar > div{height:100%;background:var(--teal);transition:width .3s;}
  .sidebar .search{padding:10px 16px;border-bottom:1px solid var(--border);}
  .sidebar .search input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:5px;font-size:13px;}
  .sidebar .groups{flex:1;overflow-y:auto;}
  .group-title{padding:10px 16px 4px;font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--text-light);text-transform:uppercase;}
  .error-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;}
  .error-item:hover{background:#f7f9fa;}
  .error-item.active{background:#f1eaf5;border-left-color:var(--primary);}
  .error-item .code{font-weight:600;font-size:12.5px;}
  .error-item .title{font-size:12px;color:var(--text-light);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .badge{width:9px;height:9px;border-radius:50%;flex:none;}
  .badge.nao_mapeado{background:var(--danger);}
  .badge.em_revisao{background:var(--warn);}
  .badge.pronto{background:var(--ok);}
  .main{flex:1;overflow-y:auto;padding:20px 28px;}
  .empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-light);}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;}
  .tab{padding:9px 16px;font-size:13px;font-weight:500;color:var(--text-light);cursor:pointer;border-bottom:2px solid transparent;}
  .tab.active{color:var(--primary);border-bottom-color:var(--primary);}
  .panel{display:none;}
  .panel.active{display:block;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:5px;color:var(--text);}
  .field .hint{font-size:11.5px;color:var(--text-light);margin-top:3px;}
  input[type=text],input[type=url],input[type=number],textarea,select{
    width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:5px;font-size:13px;font-family:inherit;background:#fff;color:var(--text);
  }
  textarea{resize:vertical;min-height:60px;}
  .row{display:flex;gap:16px;}
  .row > .field{flex:1;}
  .invalid input,.invalid textarea,.invalid select{border-color:var(--danger);background:#fff5f5;}
  .invalid-msg{color:var(--danger);font-size:11.5px;margin-top:3px;}
  .toggle{display:inline-flex;align-items:center;gap:8px;}
  .toggle input{width:auto;}
  .tags-input{display:flex;flex-wrap:wrap;gap:6px;padding:6px;border:1px solid var(--border);border-radius:5px;}
  .tag{background:#eef1f3;border-radius:3px;padding:3px 8px;font-size:12px;display:flex;align-items:center;gap:6px;}
  .tag button{background:none;color:var(--text-light);padding:0;font-size:14px;}
  .tags-input input{border:none;flex:1;min-width:100px;padding:3px;}
  .step-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;padding:8px;background:#fafbfc;border:1px solid var(--border);border-radius:5px;cursor:grab;}
  .step-item .num{font-weight:700;color:var(--primary);width:22px;flex:none;padding-top:8px;text-align:center;}
  .step-item textarea{flex:1;}
  .step-item .rm{background:none;color:var(--danger);font-size:18px;padding:4px;}
  .two-col{display:flex;gap:24px;}
  .two-col > div{flex:1;min-width:0;}
  .preview-card{position:sticky;top:0;border:1px solid var(--border);border-radius:8px;padding:18px;background:#fdfdfd;}
  .preview-card h3{margin:0 0 8px;font-size:15px;color:var(--text);}
  .preview-card .cause{font-size:12.5px;color:var(--text-light);margin-bottom:10px;}
  .preview-card ol{margin:0 0 10px;padding-left:18px;font-size:13px;}
  .preview-card .tip{background:#eef7f4;border-radius:5px;padding:8px 10px;font-size:12px;color:#1d6f5a;}
  .question-block,.rule-block{border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px;background:#fafbfc;}
  .question-block .top-row,.rule-block .top-row{display:flex;gap:10px;align-items:flex-start;}
  .rule-line{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:12.5px;}
  .rule-line select,.rule-line input{width:auto;}
  .options-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .section-title{font-size:13px;font-weight:700;margin:22px 0 10px;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:6px;}
  .system-prompt-box{white-space:pre-wrap;background:#1e2630;color:#cfe8df;padding:14px;border-radius:6px;font-family:monospace;font-size:12px;max-height:320px;overflow:auto;}
  .banner-error{background:#fdecec;border:1px solid #f3c4c4;color:var(--danger);padding:10px 14px;border-radius:5px;margin-bottom:14px;font-size:12.5px;}
  select.sev-bloqueante{color:var(--danger);}
  select.sev-configuracao{color:var(--warn);}
  select.sev-informativo{color:var(--blue);}
  .filters{display:flex;flex-wrap:wrap;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);}
  .chip{font-size:11.5px;padding:4px 9px;border-radius:12px;border:1px solid var(--border);background:#fff;color:var(--text-light);cursor:pointer;}
  .chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .rich-editor{border:1px solid var(--border);border-radius:5px;overflow:hidden;background:#fff;}
  .rt-toolbar{display:flex;align-items:center;gap:2px;padding:4px 6px;border-bottom:1px solid var(--border);background:#fafbfc;flex-wrap:wrap;}
  .rt-toolbar select{width:auto;padding:3px 6px;font-size:12px;border:none;background:transparent;color:var(--text-light);}
  .rt-toolbar button{background:transparent;border:none;color:var(--text);font-size:13px;padding:4px 7px;border-radius:4px;line-height:1;}
  .rt-toolbar button:hover{background:#eef1f3;}
  .rt-content{min-height:60px;max-height:260px;overflow-y:auto;padding:8px 10px;font-size:13px;outline:none;}
  .rt-content[data-empty="true"]:before{content:attr(data-placeholder);color:#9aa6ad;}
  .rt-content p{margin:0 0 8px;}
  .rt-content ul,.rt-content ol{margin:0 0 8px;padding-left:20px;}
  .rt-content blockquote{margin:0 0 8px;padding-left:10px;border-left:3px solid var(--border);color:var(--text-light);}
  .title-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 10px;}
  .title-suggestion{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:5px;background:#fafbfc;cursor:pointer;text-align:left;max-width:100%;}
  .title-suggestion:hover{border-color:var(--primary);background:#f5edf3;}
</style>
</head>

</div>

function buildSeed(){
  const errors = [];
  for(const group of Object.keys(SEED_RAW)){
    for(const [code, msg] of SEED_RAW[group]){
      errors.push({
        code, group, severity: "configuracao", original_message: msg,
        match_patterns: [code], requires_prefecture: false, status: "nao_mapeado",
        client_facing: { title:"", title_suggestions: TITLE_SUGGESTIONS[code] || [], description:"", steps:[], extra_tip:"" },
        agent_flow: { validation_questions:[], rules:[], escalation:{ after_attempts:3, message:"", zendesk_url:"" }, system_prompt_preview:"" }
      });
    }
  }
  return { version:"1.0", exported_at:new Date().toISOString(), errors };
}

const GROUP_LABELS = { portal_nacional:"Portal Nacional", abrasf:"ABRASF", xml_soap:"XML/SOAP" };
const SEVERITY_LABELS = { bloqueante:"Bloqueante", configuracao:"Configuração", informativo:"Informativo" };
const STATUS_LABELS = { nao_mapeado:"Não mapeado", em_revisao:"Em revisão", pronto:"Pronto" };

/* ================= ESTADO ================= */
let state = null;
let selectedCode = null;
let saveTimer = null;
let lastSavedAt = null;
let statusFilter = new Set();
let severityFilter = new Set();

function setSyncStatus(kind, text){
  const dot = document.getElementById("syncDot");
  const label = document.getElementById("syncText");
  dot.className = "sync-dot " + kind;
  label.textContent = text;
}

/* ================= GIST: LOAD / SAVE ================= */
async function loadFromGist(){
  setSyncStatus("loading","Carregando...");
  try{
    const res = await fetch(GIST_API, { headers: { Authorization: "token " + getToken() } });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const file = data.files && data.files[GIST_FILE];
    if(file && file.content){
      state = JSON.parse(file.content);
      setSyncStatus("ok","Sincronizado");
    } else {
      state = buildSeed();
      await saveToGist(true);
    }
  } catch(err){
    console.error("Erro ao carregar Gist:", err);
    const cached = localStorage.getItem("nfse-errors-cache");
    if(cached){
      state = JSON.parse(cached);
      setSyncStatus("err","Erro ao sincronizar (usando cache local)");
    } else {
      state = buildSeed();
      setSyncStatus("err","Erro ao sincronizar (dados de seed locais)");
    }
  }
  localStorage.setItem("nfse-errors-cache", JSON.stringify(state));
  render();
}

async function saveToGist(silent){
  if(!silent) setSyncStatus("loading","Salvando...");
  try{
    const res = await fetch(GIST_API, {
      method:"PATCH",
      headers:{ Authorization:"token " + getToken(), "Content-Type":"application/json" },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(state, null, 2) } } })
    });
    if(!res.ok) throw new Error("HTTP " + res.status);
    lastSavedAt = new Date();
    localStorage.setItem("nfse-errors-cache", JSON.stringify(state));
    setSyncStatus("ok","Sincronizado às " + lastSavedAt.toLocaleTimeString());
  } catch(err){
    console.error("Erro ao salvar Gist:", err);
    localStorage.setItem("nfse-errors-cache", JSON.stringify(state));
    setSyncStatus("err","Erro ao sincronizar (alterações salvas só localmente)");
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToGist(false), 1500);
}

/* ================= RENDER SIDEBAR ================= */
function render(){
  renderProgress();
  renderSidebar();
  renderMain();
}

function renderProgress(){
  const total = state.errors.length;
  const done = state.errors.filter(e => e.status === "pronto").length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("progressLabel").textContent = `${done} / ${total} erros mapeados (${pct}%)`;
  document.getElementById("progressFill").style.width = pct + "%";
}

function renderFilters(){
  const statusBox = document.getElementById("statusFilters");
  statusBox.innerHTML = Object.entries(STATUS_LABELS).map(([k,v]) =>
    `<span class="chip ${statusFilter.has(k)?'active':''}" data-status="${k}">${v}</span>`
  ).join('');
  statusBox.querySelectorAll(".chip").forEach(chip => chip.onclick = () => {
    const k = chip.dataset.status;
    statusFilter.has(k) ? statusFilter.delete(k) : statusFilter.add(k);
    renderSidebar();
  });
  const sevBox = document.getElementById("severityFilters");
  sevBox.innerHTML = Object.entries(SEVERITY_LABELS).map(([k,v]) =>
    `<span class="chip ${severityFilter.has(k)?'active':''}" data-sev="${k}">${v}</span>`
  ).join('');
  sevBox.querySelectorAll(".chip").forEach(chip => chip.onclick = () => {
    const k = chip.dataset.sev;
    severityFilter.has(k) ? severityFilter.delete(k) : severityFilter.add(k);
    renderSidebar();
  });
}

function renderSidebar(){
  renderFilters();
  const container = document.getElementById("groupsContainer");
  container.innerHTML = "";
  const term = (document.getElementById("searchInput").value || "").toLowerCase();
  for(const group of Object.keys(GROUP_LABELS)){
    const items = state.errors.filter(e => e.group === group && (
      e.code.toLowerCase().includes(term) || (e.client_facing.title||"").toLowerCase().includes(term)
    ) && (statusFilter.size === 0 || statusFilter.has(e.status))
      && (severityFilter.size === 0 || severityFilter.has(e.severity))
    );
    if(items.length === 0) continue;
    const title = document.createElement("div");
    title.className = "group-title";
    title.textContent = GROUP_LABELS[group] + " (" + items.length + ")";
    container.appendChild(title);
    for(const e of items){
      const row = document.createElement("div");
      row.className = "error-item" + (e.code === selectedCode ? " active" : "");
      row.innerHTML = `<span class="badge ${e.status}"></span><span class="code">${escapeHtml(e.code)}</span><span class="title">${escapeHtml(e.client_facing.title || e.original_message)}</span>`;
      row.onclick = () => { selectedCode = e.code; render(); };
      container.appendChild(row);
    }
  }
}

document.getElementById("searchInput").addEventListener("input", renderSidebar);

/* ================= MAIN FORM ================= */
let activeTab = "identificacao";

function getSelected(){ return state.errors.find(e => e.code === selectedCode); }

function renderMain(){
  const main = document.getElementById("mainArea");

  main.innerHTML = `

      <div class="tab ${activeTab==='cliente'?'active':''}" data-tab="cliente">2. Apresentação ao Cliente</div>

    </div>
    <div id="panelIdentificacao" class="panel ${activeTab==='identificacao'?'active':''}"></div>
    <div id="panelCliente" class="panel ${activeTab==='cliente'?'active':''}"></div>
    <div id="panelAgente" class="panel ${activeTab==='agente'?'active':''}"></div>
  `;

      </div>
      <div class="field">

        <select id="f_severity" class="sev-${err.severity}">
          ${Object.entries(SEVERITY_LABELS).map(([k,v]) => `<option value="${k}" ${err.severity===k?'selected':''}>${v}</option>`).join('')}

      </div>
      <div class="hint">Termos que identificam esse erro no texto livre retornado pela API.</div>
    </div>
    <div class="row">
      <div class="field">
        <label class="toggle"><input type="checkbox" id="f_requires_prefecture" ${err.requires_prefecture?'checked':''}> Requer ação na Prefeitura/Portal Nacional?</label>
      </div>
      <div class="field">
        <label>Status de mapeamento</label>
        <select id="f_status">
          ${Object.entries(STATUS_LABELS).map(([k,v]) => `<option value="${k}" ${err.status===k?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
    </div>
  `;
  document.getElementById("f_code").onchange = e => { err.code = e.target.value; selectedCode = err.code; fieldChanged(); };
  document.getElementById("f_group").onchange = e => { err.group = e.target.value; fieldChanged(); };
  document.getElementById("f_severity").onchange = e => { err.severity = e.target.value; fieldChanged(); renderTabIdentificacao(err); };
  document.getElementById("f_requires_prefecture").onchange = e => { err.requires_prefecture = e.target.checked; fieldChanged(); };
  document.getElementById("f_status").onchange = e => {
    if(e.target.value === "pronto" && !validateReadyToShip(err)){
      alert("Preencha os campos obrigatórios das Abas 1 e 2 antes de marcar como Pronto.");
      e.target.value = err.status;
      return;
    }
    err.status = e.target.value; fieldChanged();
  };
  const patInput = document.getElementById("f_pattern_new");
  patInput.onkeydown = e => {
    if(e.key === "Enter" && patInput.value.trim()){
      err.match_patterns.push(patInput.value.trim());
      patInput.value = "";
      fieldChanged(); renderTabIdentificacao(err);
    }

    copy.code = newCode;
    copy.status = "em_revisao";
    state.errors.push(copy);
    selectedCode = newCode;
    fieldChanged();
    render();
  };

// Erro é considerado "pronto" quando a apresentação ao cliente (Aba 2) está completa;
// o fluxo do agente (Aba 3) é opcional e não bloqueia o status.
function validateReadyToShip(err){
  return !!(err.client_facing.title && htmlToText(err.client_facing.description) && err.client_facing.steps.some(s => htmlToText(s)));
}

      <div>
        <div class="field ${missingTitle?'invalid':''}">
          <label>Título amigável *</label>

            ${suggestions.map((s,i) => `<button type="button" class="title-suggestion" data-i="${i}">${escapeHtml(s)}</button>`).join('')}
          </div>` : ''}
          <input type="text" id="c_title" placeholder="Selecione uma sugestão acima ou escreva livremente" value="${escapeAttr(err.client_facing.title)}">
          ${missingTitle?'<div class="invalid-msg">Campo obrigatório para status Pronto</div>':''}

        </div>

          <div class="rich-editor" id="c_tip"></div>

      <div>
        <div class="preview-card">
          <h3 id="prevTitle">${escapeHtml(err.client_facing.title) || "Título do erro"}</h3>
          <div id="prevDesc">${err.client_facing.description || "<p>Descrição amigável aparecerá aqui.</p>"}</div>
          <ol id="prevSteps"></ol>
          <div class="tip" id="prevTip" style="${htmlToText(err.client_facing.extra_tip)?'':'display:none'}">${err.client_facing.extra_tip || ""}</div>

      </div>
    </div>
  `;

    err.client_facing.description = html;
    document.getElementById("prevDesc").innerHTML = html || "<p>Descrição amigável aparecerá aqui.</p>";
    fieldChanged();
  });
  mountRichEditor(document.getElementById("c_tip"), err.client_facing.extra_tip, "Aviso ou dica extra (opcional)...", html => {

    const tipEl = document.getElementById("prevTip");
    tipEl.innerHTML = html || "";

    fieldChanged();
  });
  document.getElementById("btnAddStep").onclick = () => { err.client_facing.steps.push(""); fieldChanged(); renderTabCliente(err); };
  renderSteps(err);

function renderSteps(err){
  const list = document.getElementById("stepsList");
  list.innerHTML = "";
  err.client_facing.steps.forEach((step, i) => {
    const row = document.createElement("div");
    row.className = "step-item";
    row.draggable = true;
    row.dataset.i = i;
    row.innerHTML = `<div class="num">${i+1}</div><div class="rich-editor" style="flex:1;"></div><button class="rm">×</button>`;
    mountRichEditor(row.querySelector(".rich-editor"), step, "Descreva este passo...", html => {
      err.client_facing.steps[i] = html;
      updatePreviewSteps(err);
      fieldChanged();
    });
    row.querySelector(".rm").onclick = () => { err.client_facing.steps.splice(i,1); fieldChanged(); renderTabCliente(err); };
    row.ondragstart = e => e.dataTransfer.setData("text/plain", i);
    row.ondragover = e => e.preventDefault();
    row.ondrop = e => {
      e.preventDefault();
      const from = +e.dataTransfer.getData("text/plain");
      const to = i;
      const [moved] = err.client_facing.steps.splice(from,1);
      err.client_facing.steps.splice(to,0,moved);
      fieldChanged(); renderTabCliente(err);
    };
    list.appendChild(row);
  });
  updatePreviewSteps(err);
}

function updatePreviewSteps(err){
  const ol = document.getElementById("prevSteps");
  if(!ol) return;
  ol.innerHTML = err.client_facing.steps.map(s => `<li>${s}</li>`).join('');
}

      e.preventDefault();
      const from = +e.dataTransfer.getData("text/plain");
      const [moved] = err.agent_flow.validation_questions.splice(from,1);
      err.agent_flow.validation_questions.splice(i,0,moved);
      fieldChanged(); renderQuestions(err);
    };
    list.appendChild(block);
  });
}

const ACTION_TYPES = {
  exibir_steps: "Exibir passo a passo",
  mensagem_personalizada: "Exibir mensagem personalizada",
  solicitar_dado: "Solicitar dado ao cliente",
  url_externa: "Direcionar para URL externa",
  escalar_suporte: "Escalar para suporte humano"
};

function renderRules(err){
  const list = document.getElementById("rulesList");
  list.innerHTML = "";
  err.agent_flow.rules.forEach((rule, i) => {
    const block = document.createElement("div");
    block.className = "rule-block";
    const questions = err.agent_flow.validation_questions;
    block.innerHTML = `
      <div class="rule-line">
        SE <select class="r-question">${questions.map((q,qi) => `<option value="${qi}" ${rule.condition.question_index===qi?'selected':''}>${escapeHtml(htmlToText(q.text))||'(pergunta '+(qi+1)+')'}</option>`).join('') || '<option>Nenhuma pergunta cadastrada</option>'}</select>
        = <input type="text" class="r-answer" placeholder="resposta" value="${escapeAttr(rule.condition.answer)}">
        ENTÃO <select class="r-action">${Object.entries(ACTION_TYPES).map(([k,v]) => `<option value="${k}" ${rule.action_type===k?'selected':''}>${v}</option>`).join('')}</select>
        <button class="rm" style="background:none;color:var(--danger);font-size:18px;">×</button>
      </div>
      <div class="action-payload" style="margin-top:8px;"></div>
    `;
    block.querySelector(".r-question").onchange = e => { rule.condition.question_index = +e.target.value; fieldChanged(); updateSystemPrompt(err); };
    block.querySelector(".r-answer").oninput = e => { rule.condition.answer = e.target.value; fieldChanged(); updateSystemPrompt(err); };
    block.querySelector(".r-action").onchange = e => { rule.action_type = e.target.value; rule.action_payload = null; fieldChanged(); renderRules(err); updateSystemPrompt(err); };
    block.querySelector(".rm").onclick = () => { err.agent_flow.rules.splice(i,1); fieldChanged(); renderTabAgente(err); };

    const payloadArea = block.querySelector(".action-payload");
    if(rule.action_type === "mensagem_personalizada" || rule.action_type === "solicitar_dado"){
      payloadArea.innerHTML = `<div class="rich-editor"></div>`;
      mountRichEditor(payloadArea.querySelector(".rich-editor"), rule.action_payload || "", "Conteúdo da mensagem...", html => {
        rule.action_payload = html; fieldChanged(); updateSystemPrompt(err);
      });
    } else if(rule.action_type === "url_externa"){
      const payload = rule.action_payload || { url:"", label:"" };
      payloadArea.innerHTML = `
        <input type="url" placeholder="URL" value="${escapeAttr(payload.url)}" style="margin-bottom:6px;">
        <input type="text" placeholder="Texto do link" value="${escapeAttr(payload.label)}">
      `;
      const [urlInput, labelInput] = payloadArea.querySelectorAll("input");
      urlInput.oninput = e => { payload.url = e.target.value; rule.action_payload = payload; fieldChanged(); updateSystemPrompt(err); };
      labelInput.oninput = e => { payload.label = e.target.value; rule.action_payload = payload; fieldChanged(); updateSystemPrompt(err); };
    } else if(rule.action_type === "escalar_suporte"){
      payloadArea.innerHTML = `<div class="rich-editor"></div>`;
      mountRichEditor(payloadArea.querySelector(".rich-editor"), rule.action_payload || "", "Mensagem de escalonamento...", html => {
        rule.action_payload = html; fieldChanged(); updateSystemPrompt(err);
      });
    } else if(rule.action_type === "exibir_steps"){
      payloadArea.innerHTML = `<div class="hint">Exibirá os passos definidos na Aba 2.</div>`;
    }
    list.appendChild(block);
  });
}

function updateSystemPrompt(err){
  const box = document.getElementById("systemPromptBox");
  if(!box) return;
  const ef = err.agent_flow;
  let prompt = `Você é o agente automático de suporte da eNotas para o erro ${err.code} (${GROUP_LABELS[err.group]||err.group}).\n\n`;
  prompt += `MENSAGEM ORIGINAL DO SISTEMA:\n"${err.original_message}"\n\n`;
  if(err.client_facing.title) prompt += `TÍTULO PARA O CLIENTE: ${err.client_facing.title}\n`;
  const descText = htmlToText(err.client_facing.description);
  if(descText) prompt += `DESCRIÇÃO AMIGÁVEL: ${descText}\n`;
  const stepsText = err.client_facing.steps.map(htmlToText).filter(Boolean);
  if(stepsText.length){
    prompt += `\nPASSO A PASSO DE SOLUÇÃO:\n`;
    stepsText.forEach((s,i) => prompt += `${i+1}. ${s}\n`);
  }
  if(ef.validation_questions.length){
    prompt += `\nPERGUNTAS DE VALIDAÇÃO (faça antes de agir):\n`;
    ef.validation_questions.forEach((q,i) => prompt += `${i+1}. [${q.response_type}] ${htmlToText(q.text)}${q.options&&q.options.length?' (opções: '+q.options.join(', ')+')':''}\n`);
  }
  if(ef.rules.length){
    prompt += `\nREGRAS CONDICIONAIS:\n`;
    ef.rules.forEach(r => {
      const q = ef.validation_questions[r.condition.question_index];
      prompt += `SE pergunta "${q?htmlToText(q.text):'?'}" = "${r.condition.answer}" ENTÃO ${ACTION_TYPES[r.action_type]}`;
      if(r.action_payload){
        const payloadText = typeof r.action_payload === 'object' ? JSON.stringify(r.action_payload) : htmlToText(r.action_payload);
        if(payloadText) prompt += ` (${payloadText})`;
      }
      prompt += `\n`;
    });
  }
  prompt += `\nESCALONAMENTO: após ${ef.escalation.after_attempts} tentativas sem solução, escale para suporte humano.`;
  const escMsgText = htmlToText(ef.escalation.message);
  if(escMsgText) prompt += `\nMensagem de escalonamento: ${escMsgText}`;
  if(ef.escalation.zendesk_url) prompt += `\nLink Zendesk: ${ef.escalation.zendesk_url}`;
  err.agent_flow.system_prompt_preview = prompt;
  box.textContent = prompt;
}

    agent_flow:{ validation_questions:[], rules:[], escalation:{ after_attempts:3, message:"", zendesk_url:"" }, system_prompt_preview:"" }
  };

  fieldChanged();
  render();
};

document.getElementById("btnExport").onclick = () => {
  const exportData = { version:"1.0", exported_at:new Date().toISOString(), errors: state.errors };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type:"application/json" });
  const url = URL.createObjectURL(blob);

/* ================= HELPERS ================= */
function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }

function htmlToText(html){
  const div = document.createElement("div");
  div.innerHTML = String(html ?? "");
  return (div.textContent || "").trim();
}

/* ================= EDITOR DE TEXTO RICO =================
   Toolbar baseada no padrão do guia-cr: bloco (Normal/Título), citação,
   negrito, itálico, sublinhado, riscado, listas, link e limpar formatação. */
function richToolbarHTML(){
  return `
    <div class="rt-toolbar">
      <select class="rt-block" title="Estilo do bloco">
        <option value="P">Normal</option>
        <option value="H3">Título</option>
      </select>
      <button type="button" data-cmd="formatBlock" data-val="BLOCKQUOTE" title="Citação">&rdquo;</button>
      <button type="button" data-cmd="bold" title="Negrito"><b>B</b></button>
      <button type="button" data-cmd="italic" title="Itálico"><i>I</i></button>
      <button type="button" data-cmd="underline" title="Sublinhado"><u>U</u></button>
      <button type="button" data-cmd="strikeThrough" title="Riscado"><s>S</s></button>
      <button type="button" data-cmd="insertOrderedList" title="Lista numerada">1.</button>
      <button type="button" data-cmd="insertUnorderedList" title="Lista">•</button>
      <button type="button" data-cmd="createLink" title="Inserir link">🔗</button>
      <button type="button" data-cmd="removeFormat" title="Limpar formatação">Tx</button>
    </div>
  `;
}

function mountRichEditor(container, html, placeholder, onChange){
  container.innerHTML = richToolbarHTML() + `<div class="rt-content" contenteditable="true" data-placeholder="${escapeAttr(placeholder||'')}"></div>`;
  const content = container.querySelector(".rt-content");
  content.innerHTML = html || "";
  content.setAttribute("data-empty", content.innerHTML.trim() ? "false" : "true");
  container.querySelectorAll(".rt-toolbar button").forEach(btn => {
    btn.onclick = () => {
      content.focus();
      const cmd = btn.dataset.cmd;
      if(cmd === "createLink"){
        const url = window.prompt("URL do link:");
        if(url) document.execCommand(cmd, false, url);
      } else if(cmd === "formatBlock"){
        document.execCommand(cmd, false, btn.dataset.val);
      } else {
        document.execCommand(cmd, false, null);
      }
      content.setAttribute("data-empty", content.innerHTML.trim() ? "false" : "true");
      onChange(content.innerHTML);
    };
  });
  container.querySelector(".rt-block").onchange = e => {
    content.focus();
    document.execCommand("formatBlock", false, e.target.value);
    onChange(content.innerHTML);
  };
  content.oninput = () => {
    content.setAttribute("data-empty", content.innerHTML.trim() ? "false" : "true");
    onChange(content.innerHTML);
  };
  return content;
}
